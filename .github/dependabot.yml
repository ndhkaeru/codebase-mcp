version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # These actions are pinned and regenerated by cargo-dist in release.yml.
      # Let `dist init` upgrade them; a Dependabot bump makes release.yml fail
      # dist's own up-to-date check.
      - dependency-name: actions/checkout
      - dependency-name: actions/upload-artifact
      - dependency-name: actions/download-artifact
